{% extends "base.html" %}
{% block title %}LIVE AUCTION — Standby{% endblock %}

{% block content %}
<div class="live-idle-wrapper d-flex align-items-center justify-content-center text-center">
    <div class="idle-content-card animate-fade-in">
        <div class="stadium-overlay"></div>
        
        <div class="content-body relative z-10">
            <div class="brand-badge-outer mb-4 mx-auto">
                <div class="brand-badge-inner">
                    <img src="/static/img/ipl-logo.png" alt="IPL Logo" style="width: 80%; height: auto; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));">
                </div>
            </div>
            
            <h1 class="display-1 fw-900 text-white mb-2 tracking-tight">AUCTION <span class="text-warning">STANDBY</span></h1>
            <p class="fs-4 text-white-50 mb-5 max-w-2xl mx-auto">The bidding floor is currently closed. Please stay tuned for the next player announcement.</p>
            
            <div class="d-flex justify-content-center gap-4 flex-wrap">
                <div class="status-pill glass-card p-4 px-5">
                    <div class="pill-label text-warning mb-1">STATUS</div>
                    <div class="pill-value fs-3 fw-800">READY</div>
                </div>
                <div class="status-pill glass-card p-4 px-5">
                    <div class="pill-label text-info mb-1">SEASON</div>
                    <div class="pill-value fs-3 fw-800">2026</div>
                </div>
            </div>
            
            <div class="mt-5 text-white-50">
                <div class="spinner-grow spinner-grow-sm text-warning me-2" role="status"></div>
                <span class="text-uppercase tracking-widest fs-xs">Waiting for Admin to start the clock...</span>
            </div>
        </div>
    </div>
</div>

<style>
    .live-idle-wrapper {
        min-height: 100vh;
        background-color: #000;
        position: relative;
        overflow: hidden;
    }
    
    .stadium-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.9)), url('/static/img/stadium_bg.png');
        background-size: cover;
        background-position: center;
        filter: blur(4px) brightness(0.6);
        transform: scale(1.1);
        z-index: 1;
    }
    
    .idle-content-card {
        position: relative;
        z-index: 10;
        padding: 4rem;
        border-radius: 40px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        max-width: 900px;
        width: 90%;
    }
    
    .brand-badge-outer {
        width: 120px; height: 120px;
        background: var(--grad-primary);
        padding: 4px;
        border-radius: 50%;
        box-shadow: 0 0 30px rgba(245, 158, 11, 0.3);
    }
    .brand-badge-inner {
        width: 100%; height: 100%;
        background: #000;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: #fff;
    }
    
    .fw-900 { font-weight: 900; }
    .tracking-tight { letter-spacing: -2px; }
    .tracking-widest { letter-spacing: 0.2em; }
    .fs-xs { font-size: 0.75rem; }
    .max-w-2xl { max-width: 42rem; }
    
    .pill-label {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 2px;
        opacity: 0.7;
    }
</style>

<script>
    // Auto-refresh to check if auction starts
    setInterval(() => {
        fetch('/auction/api/state')
            .then(res => res.json())
            .then(data => {
                if (data.status !== 'idle') {
                    location.href = '/live';
                }
            })
            .catch(e => console.error(e));
    }, 3000);
</script>
{% endblock %}

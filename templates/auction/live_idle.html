{% extends "base.html" %}
{% block title %}LIVE AUCTION — Waiting...{% endblock %}

{% block content %}
<div class="live-auction-container d-flex align-items-center justify-content-center text-center">
    <div class="animate-fade-in">
        <div class="brand-badge mb-4 mx-auto" style="width:100px; height:100px; font-size:3rem;"><i class="bi bi-cricket"></i></div>
        <h1 class="display-2 fw-800 text-white mb-2 tracking-tighter">AUCTION <span class="text-warning">STANDBY</span></h1>
        <p class="fs-4 text-muted mb-5">The live bidding is currently paused. Please wait for the next player to be announced.</p>
        
        <div class="d-flex justify-content-center gap-3">
            <div class="glass-card p-4 px-5">
                <div class="text-warning small fw-bold tracking-widest mb-2 uppercase">STATUS</div>
                <div class="fs-4 fw-bold">IDLE</div>
            </div>
            <div class="glass-card p-4 px-5">
                <div class="text-info small fw-bold tracking-widest mb-2 uppercase">SEASON</div>
                <div class="fs-4 fw-bold">2026</div>
            </div>
        </div>
    </div>
</div>

<style>
    .live-auction-container {
        min-height: 100vh;
        background: radial-gradient(circle at center, #1e293b, #020617);
    }
    .fw-800 { font-weight: 800; }
    .tracking-tighter { letter-spacing: -3px; }
    .tracking-widest { letter-spacing: 4px; }
</style>

<script>
    // Auto-refresh to check if auction starts
    setTimeout(() => {
        location.reload();
    }, 5000);
</script>
{% endblock %}
